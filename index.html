<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#E10600"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
  <meta name="apple-mobile-web-app-title" content="Kit Day"/>
  <title>Kit Day</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.svg"/>
  <style>
    :root {
      --team-primary: #E10600;
      --team-secondary: #8B0000;
      --bg: #111111;
      --surface: #1e1e1e;
      --text: #f5f5f5;
      --text-muted: #aaaaaa;
      --accent: #E10600;
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overscroll-behavior: none;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top));
      background: #111;
    }
    .logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span { color: var(--accent); }
    .btn-settings {
      background: var(--surface);
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      font-size: 20px;
    }
    .btn-settings:hover { background: #333; }

    /* ── Main content ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px 16px;
      gap: 20px;
    }

    /* ── Streak ── */
    .streak-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border-radius: 50px;
      padding: 10px 20px;
      width: 100%;
      max-width: 400px;
    }
    .streak-flame { font-size: 24px; }
    .streak-text {
      font-size: 15px;
      color: var(--text-muted);
    }
    .streak-text strong {
      color: var(--text);
      font-size: 20px;
      font-weight: 800;
    }

    /* ── Kit Card ── */
    #kit-card {
      width: 100%;
      max-width: 400px;
      border-radius: var(--radius);
      padding: 36px 24px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: linear-gradient(135deg, var(--team-primary), var(--team-secondary));
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: background 0.4s ease;
    }
    .card-label {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      opacity: 0.7;
      color: white;
    }
    #team-shield {
      width: 100px;
      height: 112px;
      filter: drop-shadow(0 4px 12px rgba(0,0,0,0.4));
    }
    #team-shield svg { width: 100%; height: 100%; }
    #team-name {
      font-size: 26px;
      font-weight: 900;
      color: white;
      text-align: center;
      text-shadow: 0 2px 8px rgba(0,0,0,0.3);
    }
    #team-phrase {
      font-size: 14px;
      color: rgba(255,255,255,0.85);
      text-align: center;
      line-height: 1.5;
      font-style: italic;
    }

    /* ── Actions ── */
    #actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }
    .btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: var(--radius);
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      letter-spacing: 0.3px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--accent);
      color: white;
      box-shadow: 0 4px 16px rgba(225,6,0,0.4);
    }
    .btn-secondary {
      background: var(--surface);
      color: var(--text-muted);
    }

    /* ── Status message ── */
    #status-msg {
      display: none;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
    }

    /* ── Notif banner ── */
    #notif-banner {
      display: none;
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 12px;
      padding: 14px 18px;
      width: 100%;
      max-width: 400px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }
    #notif-banner button {
      background: var(--accent);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 6px 14px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Kit<span>Day</span></div>
    <a href="settings.html" class="btn-settings" aria-label="Configurações">⚙️</a>
  </header>

  <main>
    <div class="streak-bar">
      <span class="streak-flame">🔥</span>
      <div class="streak-text"><strong id="streak-count">0</strong> dias seguidos</div>
    </div>

    <div id="kit-card">
      <div class="card-label">Kit do Dia</div>
      <div id="team-shield"></div>
      <div id="team-name">Carregando...</div>
      <div id="team-phrase"></div>
    </div>

    <div id="actions">
      <button class="btn btn-primary" id="btn-train">🏋️ Fui treinar!</button>
      <button class="btn btn-secondary" id="btn-skip">⏭️ Pular hoje</button>
    </div>

    <div id="status-msg"></div>

    <div id="notif-banner">
      <div>Ative as notificações para lembrar do treino todo dia!</div>
      <button id="btn-notif">Ativar notificações</button>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    // Show notification banner if not yet decided
    document.addEventListener('DOMContentLoaded', () => {
      if ('Notification' in window && Notification.permission === 'default') {
        document.getElementById('notif-banner').style.display = 'block';
        document.getElementById('btn-notif').addEventListener('click', async () => {
          const perm = await Notification.requestPermission();
          if (perm === 'granted') {
            document.getElementById('notif-banner').style.display = 'none';
            const storage = getStorage();
            const team = getDailyTeam(storage.activeTeams);
            scheduleNotification(team, storage.notifHour);
          }
        });
      }
    });
  </script>
</body>
</html>
