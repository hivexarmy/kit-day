<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#ffffff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <meta name="apple-mobile-web-app-title" content="Kit Day"/>
  <title>Kit Day</title>
  <link rel="manifest" href="manifest.json"/>
  <link rel="apple-touch-icon" href="icon-192.svg"/>
  <style>
    :root {
      --shirt-color: #E10600;
      --bg: #ffffff;
      --surface: #f4f4f5;
      --surface2: #e4e4e7;
      --border: #e4e4e7;
      --text: #18181b;
      --text-muted: #71717a;
      --accent: #18181b;
      --radius: 20px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      overscroll-behavior: none;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top));
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .logo {
      font-size: 22px;
      font-weight: 900;
      letter-spacing: -0.5px;
      color: var(--text);
    }
    .logo span { color: var(--shirt-color); transition: color 0.3s; }
    .header-actions { display: flex; gap: 8px; }
    .btn-icon {
      background: var(--surface);
      border: none;
      border-radius: 50%;
      width: 42px;
      height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      transition: background 0.2s;
      text-decoration: none;
      color: var(--text);
    }
    .btn-icon:hover { background: var(--surface2); }

    /* ── Main content ── */
    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 24px 16px;
      gap: 20px;
    }

    /* ── Streak ── */
    .streak-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--surface);
      border-radius: 50px;
      padding: 10px 20px;
      width: 100%;
      max-width: 400px;
    }
    .streak-icon { display: flex; align-items: center; }
    .streak-text {
      font-size: 15px;
      color: var(--text-muted);
    }
    .streak-text strong {
      color: var(--text);
      font-size: 20px;
      font-weight: 800;
    }

    /* ── Kit Card ── */
    #kit-card {
      width: 100%;
      max-width: 400px;
      border-radius: var(--radius);
      padding: 32px 24px;
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      background: #fff;
      border: 2px solid var(--border);
      box-shadow: 0 2px 24px rgba(0,0,0,0.06);
      transition: border-color 0.3s, box-shadow 0.3s;
    }
    .card-label {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: var(--text-muted);
    }
    #shirt-img {
      width: 140px;
      height: 140px;
      border-radius: 16px;
      object-fit: cover;
      display: none;
    }
    #shirt-swatch {
      width: 100px;
      height: 100px;
      border-radius: 50%;
      display: none;
      align-items: center;
      justify-content: center;
      background: var(--shirt-color);
    }
    #shirt-swatch svg { opacity: 0.9; }
    #shirt-name {
      font-size: 24px;
      font-weight: 900;
      color: var(--text);
      text-align: center;
    }

    /* ── Onboarding ── */
    #onboarding {
      display: none;
      flex-direction: column;
      align-items: center;
      gap: 16px;
      width: 100%;
      max-width: 400px;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 36px 24px;
      text-align: center;
    }
    #onboarding .onboard-icon { color: var(--text-muted); }
    #onboarding h2 { font-size: 20px; font-weight: 800; color: var(--text); }
    #onboarding p { font-size: 15px; color: var(--text-muted); line-height: 1.6; }

    /* ── Actions ── */
    #actions {
      display: flex;
      flex-direction: column;
      gap: 12px;
      width: 100%;
      max-width: 400px;
    }
    .btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: var(--radius);
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.1s, opacity 0.2s;
      letter-spacing: 0.3px;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
    }
    .btn:active { transform: scale(0.97); }
    .btn-primary {
      background: var(--text);
      color: #fff;
    }
    .btn-secondary {
      background: var(--surface);
      color: var(--text-muted);
    }
    .btn-outline {
      background: transparent;
      border: 2px solid var(--border);
      color: var(--text);
    }

    /* ── Status message ── */
    #status-msg {
      display: none;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 20px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      font-size: 16px;
      line-height: 1.6;
      color: var(--text);
      align-items: center;
      justify-content: center;
      gap: 10px;
    }

    /* ── Notif banner ── */
    #notif-banner {
      display: none;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      width: 100%;
      max-width: 400px;
      font-size: 13px;
      color: var(--text-muted);
      text-align: center;
    }
    #notif-banner button {
      background: var(--text);
      color: white;
      border: none;
      border-radius: 8px;
      padding: 8px 16px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      font-size: 13px;
    }
  </style>
</head>
<body>
  <header>
    <div class="logo">Kit<span>Day</span></div>
    <div class="header-actions">
      <!-- Collection button -->
      <a href="collection.html" class="btn-icon" aria-label="Minha Coleção">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/>
          <rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/>
        </svg>
      </a>
      <!-- Settings button -->
      <a href="settings.html" class="btn-icon" aria-label="Configurações">
        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="12" r="3"/>
          <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06A1.65 1.65 0 0 0 15 19.4a1.65 1.65 0 0 0-1.65 1.49v.09a2 2 0 1 1-4 0v-.09A1.65 1.65 0 0 0 8 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 3.4 15a1.65 1.65 0 0 0-1.49-1.65H1.9a2 2 0 1 1 0-4h.09A1.65 1.65 0 0 0 3.4 8a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 8 3.4a1.65 1.65 0 0 0 1.65-1.49V1.9a2 2 0 1 1 4 0v.09A1.65 1.65 0 0 0 15 3.4a1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 8a1.65 1.65 0 0 0 1.49 1.65h.09a2 2 0 1 1 0 4h-.09A1.65 1.65 0 0 0 19.4 15z"/>
        </svg>
      </a>
    </div>
  </header>

  <main>
    <!-- Streak bar -->
    <div class="streak-bar">
      <span class="streak-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="#f97316" stroke="#f97316" stroke-width="1">
          <path d="M12 2c0 0-5 4-5 9a5 5 0 0 0 10 0c0-5-5-9-5-9z"/>
          <path d="M12 12c-1 0-2 .8-2 2s.9 2 2 2 2-.9 2-2-.9-2-2-2z" fill="#fff" stroke="none"/>
        </svg>
      </span>
      <div class="streak-text"><strong id="streak-count">0</strong> dias seguidos</div>
    </div>

    <!-- Onboarding: no shirts yet -->
    <div id="onboarding">
      <div class="onboard-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="56" height="56" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/>
        </svg>
      </div>
      <h2>Sua coleção está vazia</h2>
      <p>Cadastre suas camisetas para sortear qual vestir no treino de hoje.</p>
      <a href="collection.html" class="btn btn-primary" style="text-decoration:none; max-width:220px;">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
        Adicionar camiseta
      </a>
    </div>

    <!-- Kit card -->
    <div id="kit-card">
      <div class="card-label">Kit do Dia</div>
      <img id="shirt-img" alt="Foto da camiseta"/>
      <div id="shirt-swatch">
        <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/>
        </svg>
      </div>
      <div id="shirt-name">Carregando...</div>
    </div>

    <!-- Action buttons -->
    <div id="actions" style="display:none;">
      <button class="btn btn-primary" id="btn-train">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
        Fui treinar!
      </button>
      <button class="btn btn-secondary" id="btn-skip">
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/><line x1="19" y1="3" x2="19" y2="21"/></svg>
        Pular hoje
      </button>
    </div>

    <!-- Status message (after action) -->
    <div id="status-msg"></div>

    <!-- Notification banner -->
    <div id="notif-banner">
      <div>Ative as notificações para lembrar do treino todo dia!</div>
      <button id="btn-notif">Ativar notificações</button>
    </div>
  </main>

  <script src="app.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => {
      if ('Notification' in window && Notification.permission === 'default') {
        document.getElementById('notif-banner').style.display = 'block';
        document.getElementById('btn-notif').addEventListener('click', async () => {
          const perm = await Notification.requestPermission();
          if (perm === 'granted') {
            document.getElementById('notif-banner').style.display = 'none';
            const storage = getStorage();
            const shirt = getDailyShirt(storage.shirts);
            scheduleNotification(shirt, storage.notifHour);
          }
        });
      }
    });
  </script>
</body>
</html>
