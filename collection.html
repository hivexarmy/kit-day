<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#ffffff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>Kit Day — Coleção</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f4f4f5;
      --surface2: #e4e4e7;
      --border: #e4e4e7;
      --text: #18181b;
      --text-muted: #71717a;
      --accent: #18181b;
      --radius: 16px;
      --danger: #ef4444;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top));
      background: #fff;
      border-bottom: 1px solid var(--border);
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .btn-icon {
      background: var(--surface);
      border: none;
      border-radius: 50%;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; text-decoration: none; color: var(--text);
      transition: background 0.2s;
    }
    .btn-icon:hover { background: var(--surface2); }
    header h1 { font-size: 20px; font-weight: 800; }

    /* ── Main ── */
    main {
      flex: 1;
      padding: 20px 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    /* ── Empty state ── */
    #empty-state {
      display: none;
      flex-direction: column;
      align-items: center;
      text-align: center;
      gap: 12px;
      padding: 48px 24px;
      color: var(--text-muted);
    }
    #empty-state h2 { font-size: 18px; font-weight: 700; color: var(--text); }
    #empty-state p { font-size: 14px; line-height: 1.6; }

    /* ── Shirt grid ── */
    #shirt-list {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 12px;
    }

    /* ── Shirt card ── */
    .shirt-card {
      background: var(--surface);
      border-radius: var(--radius);
      overflow: hidden;
      position: relative;
      display: flex;
      flex-direction: column;
    }
    .shirt-card-photo {
      width: 100%;
      aspect-ratio: 1;
      object-fit: cover;
      display: block;
    }
    .shirt-card-swatch {
      width: 100%;
      aspect-ratio: 1;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .shirt-card-body {
      padding: 10px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 6px;
    }
    .shirt-card-name {
      font-size: 13px;
      font-weight: 700;
      color: var(--text);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      flex: 1;
    }
    .btn-remove {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--text-muted);
      display: flex;
      align-items: center;
      padding: 4px;
      border-radius: 8px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
    }
    .btn-remove:hover { color: var(--danger); background: #fef2f2; }

    /* ── FAB ── */
    #btn-add {
      position: fixed;
      bottom: calc(24px + env(safe-area-inset-bottom));
      right: 24px;
      width: 56px; height: 56px;
      background: var(--text);
      border: none;
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      box-shadow: 0 4px 20px rgba(0,0,0,0.2);
      transition: transform 0.1s, background 0.2s;
      color: #fff;
      z-index: 20;
    }
    #btn-add:active { transform: scale(0.93); }

    /* ── Modal overlay ── */
    #modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.4);
      z-index: 100;
      align-items: flex-end;
      justify-content: center;
    }
    #modal-overlay.open { display: flex; }

    /* ── Modal sheet ── */
    #modal {
      background: #fff;
      border-radius: 24px 24px 0 0;
      padding: 24px 20px calc(32px + env(safe-area-inset-bottom));
      width: 100%;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      gap: 16px;
      animation: slideUp 0.25s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(100%); }
      to { transform: translateY(0); }
    }
    .modal-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    .modal-title { font-size: 18px; font-weight: 800; }
    .btn-close {
      background: var(--surface);
      border: none;
      border-radius: 50%;
      width: 36px; height: 36px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; color: var(--text);
    }

    /* ── Form ── */
    label { font-size: 13px; font-weight: 600; color: var(--text-muted); display: block; margin-bottom: 6px; }
    input[type="text"] {
      width: 100%;
      padding: 14px 16px;
      border: 1.5px solid var(--border);
      border-radius: 12px;
      font-size: 16px;
      background: #fff;
      color: var(--text);
      outline: none;
      transition: border-color 0.2s;
    }
    input[type="text"]:focus { border-color: var(--text); }

    /* Photo upload area */
    #photo-area {
      border: 2px dashed var(--border);
      border-radius: 12px;
      padding: 20px;
      text-align: center;
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: var(--text-muted);
      font-size: 14px;
      position: relative;
    }
    #photo-area:hover { border-color: var(--text); background: var(--surface); }
    #photo-area input { position: absolute; inset: 0; opacity: 0; cursor: pointer; }
    #photo-preview {
      display: none;
      width: 100%;
      max-height: 200px;
      object-fit: cover;
      border-radius: 10px;
    }

    /* Color picker row */
    .color-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }
    input[type="color"] {
      width: 48px; height: 48px;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      padding: 0;
      background: none;
    }
    .color-label-text { font-size: 14px; color: var(--text-muted); }

    /* Save button */
    .btn-save {
      width: 100%;
      padding: 16px;
      border: none;
      border-radius: var(--radius);
      background: var(--text);
      color: #fff;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .btn-save:active { opacity: 0.8; }

    /* Toast */
    .toast {
      display: none;
      position: fixed;
      bottom: calc(80px + env(safe-area-inset-bottom));
      left: 50%; transform: translateX(-50%);
      background: var(--text);
      color: #fff;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      z-index: 200;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="btn-icon" aria-label="Voltar">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1>Minha Coleção</h1>
    <div style="width:42px;"></div><!-- spacer -->
  </header>

  <main>
    <div id="empty-state">
      <svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--surface2)">
        <path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/>
      </svg>
      <h2>Nenhuma camiseta ainda</h2>
      <p>Toque no botão <strong>+</strong> para adicionar sua primeira camiseta de treino.</p>
    </div>

    <div id="shirt-list"></div>
  </main>

  <!-- FAB -->
  <button id="btn-add" aria-label="Adicionar camiseta">
    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
  </button>

  <!-- Modal -->
  <div id="modal-overlay">
    <div id="modal">
      <div class="modal-header">
        <div class="modal-title">Nova camiseta</div>
        <button class="btn-close" id="btn-close-modal" aria-label="Fechar">
          <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
        </button>
      </div>

      <div>
        <label for="shirt-name-input">Nome da camiseta</label>
        <input type="text" id="shirt-name-input" placeholder="Ex: Barcelona Home 2024" maxlength="60" autocomplete="off"/>
      </div>

      <div>
        <label>Foto (opcional)</label>
        <div id="photo-area">
          <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
          <span>Toque para selecionar foto</span>
          <input type="file" id="shirt-photo-input" accept="image/*" capture="environment"/>
          <img id="photo-preview" alt="Preview"/>
        </div>
      </div>

      <div>
        <label>Cor de destaque</label>
        <div class="color-row">
          <input type="color" id="shirt-color-input" value="#E10600"/>
          <span class="color-label-text">Escolha uma cor para representar a camiseta</span>
        </div>
      </div>

      <button class="btn-save" id="btn-save-shirt">Salvar camiseta</button>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    // ── Storage ──────────────────────────────────────────────────
    function getStorage() {
      const defaults = { streak:0, lastTraining:null, lastSkipped:null, lastAction:null, notifHour:7, shirts:[] };
      try { return { ...defaults, ...JSON.parse(localStorage.getItem('kitday')||'{}') }; }
      catch { return defaults; }
    }
    function saveStorage(data) { localStorage.setItem('kitday', JSON.stringify(data)); }

    function genId() { return Math.random().toString(36).slice(2) + Date.now().toString(36); }

    // ── State ────────────────────────────────────────────────────
    let photoBase64 = null;

    // ── Render list ──────────────────────────────────────────────
    function renderList() {
      const storage = getStorage();
      const shirts = storage.shirts || [];
      const listEl = document.getElementById('shirt-list');
      const emptyEl = document.getElementById('empty-state');

      if (shirts.length === 0) {
        emptyEl.style.display = 'flex';
        listEl.innerHTML = '';
        return;
      }
      emptyEl.style.display = 'none';

      listEl.innerHTML = shirts.map(s => `
        <div class="shirt-card" data-id="${s.id}">
          ${s.photo
            ? `<img class="shirt-card-photo" src="${s.photo}" alt="${s.name}"/>`
            : `<div class="shirt-card-swatch" style="background:${s.color||'#e4e4e7'}">
                <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                  <path d="M20.38 3.46L16 2a4 4 0 0 1-8 0L3.62 3.46a2 2 0 0 0-1.34 2.23l.58 3.57a1 1 0 0 0 .99.84H6v10c0 1.1.9 2 2 2h8a2 2 0 0 0 2-2V10h2.15a1 1 0 0 0 .99-.84l.58-3.57a2 2 0 0 0-1.34-2.23z"/>
                </svg>
              </div>`
          }
          <div class="shirt-card-body">
            <div class="shirt-card-name">${escHtml(s.name)}</div>
            <button class="btn-remove" data-id="${s.id}" aria-label="Remover">
              <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/>
              </svg>
            </button>
          </div>
        </div>
      `).join('');

      // Bind remove buttons
      listEl.querySelectorAll('.btn-remove').forEach(btn => {
        btn.addEventListener('click', () => removeShirt(btn.dataset.id));
      });
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    function removeShirt(id) {
      if (!confirm('Remover esta camiseta da coleção?')) return;
      const storage = getStorage();
      storage.shirts = (storage.shirts||[]).filter(s => s.id !== id);
      saveStorage(storage);
      renderList();
      showToast('Camiseta removida');
    }

    // ── Modal ────────────────────────────────────────────────────
    function openModal() {
      document.getElementById('shirt-name-input').value = '';
      document.getElementById('shirt-color-input').value = '#E10600';
      document.getElementById('shirt-photo-input').value = '';
      document.getElementById('photo-preview').style.display = 'none';
      document.getElementById('photo-preview').src = '';
      const area = document.getElementById('photo-area');
      area.querySelector('svg').style.display = '';
      area.querySelector('span').style.display = '';
      photoBase64 = null;
      document.getElementById('modal-overlay').classList.add('open');
      document.getElementById('shirt-name-input').focus();
    }

    function closeModal() {
      document.getElementById('modal-overlay').classList.remove('open');
    }

    document.getElementById('btn-add').addEventListener('click', openModal);
    document.getElementById('btn-close-modal').addEventListener('click', closeModal);
    document.getElementById('modal-overlay').addEventListener('click', e => {
      if (e.target === document.getElementById('modal-overlay')) closeModal();
    });

    // ── Photo handling ───────────────────────────────────────────
    document.getElementById('shirt-photo-input').addEventListener('change', e => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = ev => {
        // Compress image to max 800px wide before saving
        const img = new Image();
        img.onload = () => {
          const MAX = 800;
          let w = img.width, h = img.height;
          if (w > MAX) { h = Math.round(h * MAX / w); w = MAX; }
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          canvas.getContext('2d').drawImage(img, 0, 0, w, h);
          photoBase64 = canvas.toDataURL('image/jpeg', 0.75);
          const preview = document.getElementById('photo-preview');
          preview.src = photoBase64;
          preview.style.display = 'block';
          document.getElementById('photo-area').querySelector('svg').style.display = 'none';
          document.getElementById('photo-area').querySelector('span').style.display = 'none';
        };
        img.src = ev.target.result;
      };
      reader.readAsDataURL(file);
    });

    // ── Save shirt ───────────────────────────────────────────────
    document.getElementById('btn-save-shirt').addEventListener('click', () => {
      const name = document.getElementById('shirt-name-input').value.trim();
      if (!name) {
        document.getElementById('shirt-name-input').focus();
        return;
      }
      const color = document.getElementById('shirt-color-input').value;
      const shirt = { id: genId(), name, color, photo: photoBase64 };
      const storage = getStorage();
      storage.shirts = storage.shirts || [];
      storage.shirts.push(shirt);
      saveStorage(storage);
      closeModal();
      renderList();
      showToast('Camiseta adicionada!');
    });

    // ── Toast ────────────────────────────────────────────────────
    let toastTimer;
    function showToast(msg) {
      const el = document.getElementById('toast');
      el.textContent = msg;
      el.style.display = 'block';
      clearTimeout(toastTimer);
      toastTimer = setTimeout(() => { el.style.display = 'none'; }, 2200);
    }

    // ── Init ─────────────────────────────────────────────────────
    renderList();
  </script>
</body>
</html>
