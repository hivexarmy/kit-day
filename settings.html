<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#ffffff"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <meta name="apple-mobile-web-app-status-bar-style" content="default"/>
  <title>Kit Day — Configurações</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    :root {
      --bg: #ffffff;
      --surface: #f4f4f5;
      --surface2: #e4e4e7;
      --border: #e4e4e7;
      --text: #18181b;
      --text-muted: #71717a;
      --accent: #18181b;
      --danger: #ef4444;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      min-height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }

    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top));
      background: #fff;
      border-bottom: 1px solid var(--border);
    }
    .btn-icon {
      background: var(--surface);
      border: none;
      border-radius: 50%;
      width: 42px; height: 42px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer; text-decoration: none; color: var(--text);
      transition: background 0.2s;
    }
    .btn-icon:hover { background: var(--surface2); }
    header h1 { font-size: 20px; font-weight: 800; }

    main {
      flex: 1;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    .section-title {
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* Notif hour */
    .hour-selector {
      display: flex;
      gap: 10px;
    }
    .hour-btn {
      flex: 1;
      padding: 16px 12px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 14px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }
    .hour-btn.active {
      border-color: var(--text);
      color: var(--text);
      background: #fff;
    }
    .hour-btn svg { opacity: 0.6; }
    .hour-btn.active svg { opacity: 1; }
    .hour-small { font-size: 12px; font-weight: 500; color: var(--text-muted); }
    .hour-btn.active .hour-small { color: var(--text-muted); }

    /* Danger zone */
    .danger-btn {
      width: 100%;
      padding: 16px;
      border: 1.5px solid var(--danger);
      border-radius: var(--radius);
      background: transparent;
      color: var(--danger);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }
    .danger-btn:hover { background: #fef2f2; }

    .save-btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: var(--radius);
      background: var(--text);
      color: white;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: opacity 0.2s;
    }
    .save-btn:active { opacity: 0.8; }

    /* Link to collection */
    .collection-link {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px 18px;
      text-decoration: none;
      color: var(--text);
      transition: background 0.2s;
    }
    .collection-link:hover { background: var(--surface2); }
    .collection-link-info { display: flex; flex-direction: column; gap: 2px; }
    .collection-link-label { font-size: 16px; font-weight: 600; }
    .collection-link-sub { font-size: 12px; color: var(--text-muted); }

    .toast {
      display: none;
      position: fixed;
      bottom: calc(24px + env(safe-area-inset-bottom));
      left: 50%;
      transform: translateX(-50%);
      background: var(--text);
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      z-index: 999;
      white-space: nowrap;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="btn-icon" aria-label="Voltar">
      <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
    </a>
    <h1>Configurações</h1>
  </header>

  <main>
    <!-- Coleção -->
    <div>
      <div class="section-title">Coleção</div>
      <a href="collection.html" class="collection-link">
        <div class="collection-link-info">
          <div class="collection-link-label">Gerenciar camisetas</div>
          <div class="collection-link-sub" id="shirt-count-label">Carregando...</div>
        </div>
        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg>
      </a>
    </div>

    <!-- Horário -->
    <div>
      <div class="section-title">Horário do lembrete</div>
      <div class="hour-selector">
        <button class="hour-btn" id="hour-7" data-hour="7">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
          Manhã
          <span class="hour-small">07:00</span>
        </button>
        <button class="hour-btn" id="hour-21" data-hour="21">
          <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
          Noite
          <span class="hour-small">21:00</span>
        </button>
      </div>
    </div>

    <!-- Danger zone -->
    <div>
      <div class="section-title">Zona de perigo</div>
      <button class="danger-btn" id="btn-reset">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>
        Resetar streak e histórico
      </button>
    </div>

    <button class="save-btn" id="btn-save">Salvar configurações</button>
  </main>

  <div class="toast" id="toast"></div>

  <script>
    function getStorage() {
      const defaults = { streak:0, lastTraining:null, lastAction:null, lastSkipped:null, notifHour:7, shirts:[] };
      try { return { ...defaults, ...JSON.parse(localStorage.getItem('kitday')||'{}') }; }
      catch { return defaults; }
    }
    function saveStorage(data) { localStorage.setItem('kitday', JSON.stringify(data)); }

    const storage = getStorage();

    // Shirt count label
    const count = (storage.shirts||[]).length;
    document.getElementById('shirt-count-label').textContent =
      count === 0 ? 'Nenhuma camiseta cadastrada'
      : count === 1 ? '1 camiseta cadastrada'
      : `${count} camisetas cadastradas`;

    // Load hour
    function setActiveHour(hour) {
      document.querySelectorAll('.hour-btn').forEach(b => b.classList.remove('active'));
      const el = document.getElementById('hour-' + hour);
      if (el) el.classList.add('active');
    }
    setActiveHour(storage.notifHour || 7);

    document.querySelectorAll('.hour-btn').forEach(btn => {
      btn.addEventListener('click', () => setActiveHour(btn.dataset.hour));
    });

    // Save
    document.getElementById('btn-save').addEventListener('click', () => {
      const activeHourEl = document.querySelector('.hour-btn.active');
      const hour = activeHourEl ? parseInt(activeHourEl.dataset.hour) : 7;
      const updated = { ...getStorage(), notifHour: hour };
      saveStorage(updated);
      const toast = document.getElementById('toast');
      toast.textContent = 'Salvo!';
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 2000);
    });

    // Reset
    document.getElementById('btn-reset').addEventListener('click', () => {
      if (confirm('Resetar streak e histórico? Suas camisetas não serão removidas.')) {
        const s = getStorage();
        const clean = { ...s, streak:0, lastTraining:null, lastAction:null, lastSkipped:null };
        saveStorage(clean);
        const toast = document.getElementById('toast');
        toast.textContent = 'Streak resetado!';
        toast.style.display = 'block';
        setTimeout(() => { toast.style.display = 'none'; }, 2000);
      }
    });
  </script>
</body>
</html>
