<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover"/>
  <meta name="theme-color" content="#E10600"/>
  <meta name="apple-mobile-web-app-capable" content="yes"/>
  <title>Kit Day — Configurações</title>
  <link rel="manifest" href="manifest.json"/>
  <style>
    :root {
      --bg: #111111;
      --surface: #1e1e1e;
      --surface2: #2a2a2a;
      --text: #f5f5f5;
      --text-muted: #aaaaaa;
      --accent: #E10600;
      --radius: 16px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    }
    body {
      display: flex;
      flex-direction: column;
      min-height: 100dvh;
      padding-bottom: env(safe-area-inset-bottom);
    }
    header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top));
      background: #111;
    }
    .btn-back {
      background: var(--surface);
      border: none;
      border-radius: 50%;
      width: 42px; height: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      font-size: 20px;
      text-decoration: none;
      color: var(--text);
    }
    header h1 { font-size: 20px; font-weight: 800; }

    main {
      flex: 1;
      padding: 24px 16px;
      display: flex;
      flex-direction: column;
      gap: 24px;
      max-width: 480px;
      margin: 0 auto;
      width: 100%;
    }

    .section-title {
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 1.5px;
      text-transform: uppercase;
      color: var(--text-muted);
      margin-bottom: 10px;
    }

    /* Toggle rows */
    .toggle-row {
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--surface);
      border-radius: var(--radius);
      padding: 16px 18px;
      margin-bottom: 8px;
    }
    .toggle-info { display: flex; flex-direction: column; gap: 2px; }
    .toggle-label { font-size: 16px; font-weight: 600; }
    .toggle-sub { font-size: 12px; color: var(--text-muted); }

    /* Toggle switch */
    .switch { position: relative; width: 50px; height: 28px; flex-shrink: 0; }
    .switch input { opacity: 0; width: 0; height: 0; }
    .slider {
      position: absolute;
      cursor: pointer;
      inset: 0;
      background: #444;
      border-radius: 50px;
      transition: background 0.2s;
    }
    .slider:before {
      content: '';
      position: absolute;
      width: 22px; height: 22px;
      left: 3px; top: 3px;
      background: white;
      border-radius: 50%;
      transition: transform 0.2s;
    }
    input:checked + .slider { background: var(--accent); }
    input:checked + .slider:before { transform: translateX(22px); }

    /* Notif hour */
    .hour-selector {
      display: flex;
      gap: 10px;
    }
    .hour-btn {
      flex: 1;
      padding: 14px;
      border: 2px solid #333;
      border-radius: var(--radius);
      background: var(--surface);
      color: var(--text-muted);
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s;
      text-align: center;
    }
    .hour-btn.active {
      border-color: var(--accent);
      color: var(--text);
      background: var(--surface2);
    }

    /* Danger zone */
    .danger-btn {
      width: 100%;
      padding: 16px;
      border: 2px solid #FF4444;
      border-radius: var(--radius);
      background: transparent;
      color: #FF4444;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      transition: background 0.2s;
    }
    .danger-btn:hover { background: rgba(255,68,68,0.1); }

    .save-btn {
      width: 100%;
      padding: 18px;
      border: none;
      border-radius: var(--radius);
      background: var(--accent);
      color: white;
      font-size: 17px;
      font-weight: 700;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(225,6,0,0.4);
    }
    .save-btn:active { opacity: 0.8; }

    .toast {
      display: none;
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%);
      background: #333;
      color: white;
      padding: 12px 24px;
      border-radius: 50px;
      font-size: 14px;
      font-weight: 600;
      z-index: 999;
    }
  </style>
</head>
<body>
  <header>
    <a href="index.html" class="btn-back">←</a>
    <h1>Configurações</h1>
  </header>

  <main>
    <!-- Times ativos -->
    <div>
      <div class="section-title">Times ativos</div>

      <div class="toggle-row">
        <div class="toggle-info">
          <div class="toggle-label">🔵🔴 Barcelona</div>
          <div class="toggle-sub">Més que un club</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggle-barcelona" checked/>
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <div class="toggle-info">
          <div class="toggle-label">🔵 Chelsea</div>
          <div class="toggle-sub">The Blues</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggle-chelsea" checked/>
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <div class="toggle-info">
          <div class="toggle-label">🔴⚫ São Paulo FC</div>
          <div class="toggle-sub">Tricolor do Morumbi</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggle-saopaulo" checked/>
          <span class="slider"></span>
        </label>
      </div>

      <div class="toggle-row">
        <div class="toggle-info">
          <div class="toggle-label">🔴 Bayern de Munique</div>
          <div class="toggle-sub">Mia san mia</div>
        </div>
        <label class="switch">
          <input type="checkbox" id="toggle-bayern" checked/>
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <!-- Horário de notificação -->
    <div>
      <div class="section-title">Horário do lembrete</div>
      <div class="hour-selector">
        <div class="hour-btn" id="hour-7" data-hour="7">☀️ Manhã<br><small>07:00</small></div>
        <div class="hour-btn" id="hour-21" data-hour="21">🌙 Noite<br><small>21:00</small></div>
      </div>
    </div>

    <!-- Reset -->
    <div>
      <div class="section-title">Zona de perigo</div>
      <button class="danger-btn" id="btn-reset">🗑️ Resetar streak e histórico</button>
    </div>

    <button class="save-btn" id="btn-save">Salvar configurações</button>
  </main>

  <div class="toast" id="toast">✅ Salvo!</div>

  <script>
    function getStorage() {
      const defaults = {
        streak: 0, lastTraining: null, lastAction: null, lastSkipped: null,
        notifHour: 7, activeTeams: ['barcelona', 'chelsea', 'saopaulo', 'bayern']
      };
      try {
        return { ...defaults, ...JSON.parse(localStorage.getItem('kitday') || '{}') };
      } catch { return defaults; }
    }
    function saveStorage(data) {
      localStorage.setItem('kitday', JSON.stringify(data));
    }

    const storage = getStorage();

    // Load toggles
    ['barcelona','chelsea','saopaulo','bayern'].forEach(id => {
      const el = document.getElementById('toggle-' + id);
      if (el) el.checked = storage.activeTeams.includes(id);
    });

    // Load hour
    function setActiveHour(hour) {
      document.querySelectorAll('.hour-btn').forEach(b => b.classList.remove('active'));
      const el = document.getElementById('hour-' + hour);
      if (el) el.classList.add('active');
    }
    setActiveHour(storage.notifHour);

    document.querySelectorAll('.hour-btn').forEach(btn => {
      btn.addEventListener('click', () => setActiveHour(btn.dataset.hour));
    });

    // Save
    document.getElementById('btn-save').addEventListener('click', () => {
      const active = [];
      ['barcelona','chelsea','saopaulo','bayern'].forEach(id => {
        if (document.getElementById('toggle-' + id).checked) active.push(id);
      });
      if (!active.length) { alert('Selecione ao menos um time!'); return; }

      const activeHourEl = document.querySelector('.hour-btn.active');
      const hour = activeHourEl ? parseInt(activeHourEl.dataset.hour) : 7;

      const updated = { ...storage, activeTeams: active, notifHour: hour };
      saveStorage(updated);

      const toast = document.getElementById('toast');
      toast.style.display = 'block';
      setTimeout(() => { toast.style.display = 'none'; }, 2000);
    });

    // Reset
    document.getElementById('btn-reset').addEventListener('click', () => {
      if (confirm('Resetar streak e histórico? Essa ação não pode ser desfeita.')) {
        const clean = { ...storage, streak: 0, lastTraining: null, lastAction: null, lastSkipped: null };
        saveStorage(clean);
        alert('Streak resetado!');
      }
    });
  </script>
</body>
</html>
